<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F7F4EF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Golf Strength">
<title>Golf Strength & Power</title>
<link rel="manifest" id="manifest-placeholder">
<script>
  const manifestData = {
    name: "Golf Strength & Power", short_name: "Golf S&P",
    description: "Golf strength and power kettlebell program",
    start_url: ".", display: "standalone",
    background_color: "#F7F4EF", theme_color: "#F7F4EF", orientation: "portrait"
  };
  const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
  document.getElementById('manifest-placeholder').href = URL.createObjectURL(blob);
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --border: #E2DDD6;
    --text: #2C2825;
    --muted: #9E968C;
    --accent-a: #6B8F71;   /* sage green */
    --accent-b: #8B7355;   /* warm umber */
    --accent-c: #A67B5B;   /* terracotta */
    --danger: #C0614A;
    --safe: #6B8F71;
    --highlight: #E8E0D0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; min-height: 100dvh;
    overflow-x: hidden; overscroll-behavior: none;
  }

  .screen { display: none; flex-direction: column; min-height: 100dvh; }
  .screen.active { display: flex; }

  /* ── HEADER ── */
  .header {
    padding: 52px 24px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .header-eyebrow {
    font-size: 9px; letter-spacing: 4px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px; font-weight: 300; line-height: 1.15; color: var(--text);
  }
  .header-title em { font-style: italic; color: var(--muted); }

  /* ── BODY ── */
  .body { flex: 1; overflow-y: auto; padding: 20px 24px 110px; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(247,244,239,0.96);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 6px 0; transition: color 0.2s;
  }
  .nav-btn.active { color: var(--text); }
  .nav-btn svg { width: 20px; height: 20px; }

  /* ── STREAK CARD ── */
  .streak-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .streak-flame { font-size: 34px; line-height: 1; }
  .streak-info { flex: 1; }
  .streak-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px; font-weight: 300; line-height: 1; color: var(--text);
  }
  .streak-number em { font-style: italic; color: var(--muted); font-size: 16px; margin-left: 4px; }
  .streak-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
  .streak-best { font-size: 10px; color: var(--muted); margin-top: 5px; }

  /* ── DAY CARDS ── */
  .day-grid { display: flex; flex-direction: column; gap: 12px; }
  .day-card {
    border: 1px solid var(--border); border-radius: 14px;
    background: var(--surface); padding: 22px; cursor: pointer;
    transition: background 0.15s; position: relative; overflow: hidden;
  }
  .day-card::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .day-card.day-a::after { background: var(--accent-a); }
  .day-card.day-b::after { background: var(--accent-b); }
  .day-card.day-c::after { background: var(--accent-c); }
  .day-card:active { background: var(--surface2); }

  .day-card-tag { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
  .day-a .day-card-tag { color: var(--accent-a); }
  .day-b .day-card-tag { color: var(--accent-b); }
  .day-c .day-card-tag { color: var(--accent-c); }

  .day-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 400; margin-bottom: 3px;
  }
  .day-card-sub { font-size: 10px; color: var(--muted); }
  .day-card-meta {
    display: flex; gap: 20px; margin-top: 16px;
    padding-top: 14px; border-top: 1px solid var(--border);
  }
  .day-card-meta-item { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .day-card-meta-item span { display: block; font-size: 13px; color: var(--text); margin-top: 3px; letter-spacing: 0; text-transform: none; }

  .completed-badge {
    position: absolute; top: 18px; right: 18px;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--safe); border: 1px solid var(--safe);
    padding: 3px 8px; border-radius: 4px; opacity: 0.9;
  }

  /* ── WORKOUT HEADER ── */
  .workout-header {
    padding: 52px 24px 16px; border-bottom: 1px solid var(--border); background: var(--bg);
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; margin-bottom: 12px; padding: 0;
  }
  .back-btn:active { color: var(--text); }
  .workout-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 300;
  }
  .workout-title em { font-style: italic; color: var(--muted); }
  .workout-progress { margin-top: 14px; height: 1px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .workout-progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  /* ── EXERCISE CARDS ── */
  .ex-card {
    border: 1px solid var(--border); border-radius: 14px;
    background: var(--surface); margin-bottom: 10px; overflow: hidden;
  }
  .ex-card-header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px; cursor: pointer;
  }
  .ex-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 400; }
  .ex-meta { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
  .ex-done-indicator { font-size: 17px; }
  .ex-body { padding: 0 18px 18px; }

  /* ── SETS ── */
  .sets-header {
    display: grid; grid-template-columns: 32px 1fr 1fr 32px;
    gap: 8px; padding: 8px 0;
    font-size: 8px; letter-spacing: 2px; color: var(--muted);
    text-transform: uppercase; border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .sets-header span:not(:first-child) { text-align: center; }
  .set-row {
    display: grid; grid-template-columns: 32px 1fr 1fr 32px;
    gap: 8px; align-items: center; padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .set-row:last-of-type { border-bottom: none; }
  .set-num { font-size: 11px; color: var(--muted); text-align: center; }
  .set-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 14px;
    text-align: center; padding: 9px 4px; width: 100%;
    appearance: none; -webkit-appearance: none; transition: border-color 0.2s;
  }
  .set-input:focus { outline: none; border-color: var(--muted); }
  .set-input::placeholder { color: var(--border); }
  .set-check {
    width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid var(--border); background: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: all 0.15s; flex-shrink: 0; color: transparent;
  }
  .set-check.checked { background: var(--safe); border-color: var(--safe); color: white; }

  .add-set-btn {
    width: 100%; margin-top: 12px;
    background: none; border: 1px dashed var(--border);
    border-radius: 8px; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 10px; cursor: pointer;
  }
  .add-set-btn:active { border-color: var(--muted); color: var(--text); }

  /* ── YOUTUBE LINK ── */
  .yt-link {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px; padding: 8px 12px;
    background: #FFF0EE; border: 1px solid #F5D0CA;
    border-radius: 8px; color: #C0614A;
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none;
  }
  .yt-link:active { background: #FFDDD8; }

  /* ── GOLF TIP ── */
  .golf-tip-btn {
    display: flex; align-items: center; gap: 6px; margin-top: 10px;
    background: none; border: none; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 0;
  }
  .golf-tip-content {
    margin-top: 8px; padding: 12px; background: #F5F3EE; border-radius: 8px;
    border-left: 2px solid var(--accent-a);
    font-size: 11px; color: var(--muted); line-height: 1.7; display: none;
  }
  .golf-tip-content.open { display: block; }

  /* ── FINISH BTN ── */
  .finish-btn {
    position: fixed; bottom: calc(64px + env(safe-area-inset-bottom));
    left: 24px; right: 24px; padding: 16px;
    border: none; border-radius: 12px;
    font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400;
    cursor: pointer; transition: opacity 0.2s; z-index: 50;
    background: var(--text); color: var(--bg);
    letter-spacing: 0.5px;
  }
  .finish-btn:active { opacity: 0.8; }

  /* ── HISTORY ── */
  .history-empty { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 12px; line-height: 1.8; }
  .history-empty .big {
    font-family: 'Cormorant Garamond', serif; font-size: 22px;
    font-weight: 300; color: var(--text); display: block; margin-bottom: 8px;
  }
  .session-card {
    border: 1px solid var(--border); border-radius: 14px;
    background: var(--surface); padding: 18px; margin-bottom: 10px;
  }
  .session-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .session-day { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; }
  .session-date { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
  .session-stats { display: flex; gap: 20px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .session-stat { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .session-stat span { display: block; font-size: 14px; color: var(--text); margin-top: 2px; letter-spacing: 0; text-transform: none; }
  .delete-session-btn { background: none; border: none; color: var(--border); cursor: pointer; font-size: 15px; padding: 4px; }
  .delete-session-btn:active { color: var(--danger); }

  /* ── EXPORT BTN ── */
  .export-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 12px; margin-bottom: 18px;
    background: none; border: 1px solid var(--border);
    border-radius: 10px; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  }
  .export-btn:active { border-color: var(--accent-b); color: var(--accent-b); }

  /* ── MODALS ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(44,40,37,0.5);
    display: flex; align-items: flex-end; z-index: 200;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: 20px 20px 0 0;
    width: 100%; padding: 28px 24px max(28px, env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 300; margin-bottom: 8px;
  }
  .modal-sub { font-size: 11px; color: var(--muted); margin-bottom: 22px; line-height: 1.7; }
  .modal-btn {
    width: 100%; padding: 15px; border-radius: 10px;
    font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400;
    border: none; cursor: pointer; margin-bottom: 10px; transition: opacity 0.15s;
  }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn.primary { background: var(--text); color: var(--bg); }
  .modal-btn.sage { background: var(--accent-a); color: white; }
  .modal-btn.umber { background: var(--accent-b); color: white; }
  .modal-btn.ghost { background: var(--surface2); color: var(--text); }

  /* ── DATE PICKER ── */
  .date-picker-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; padding: 12px 14px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  }
  .date-picker-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; flex-shrink: 0; }
  .date-picker-input {
    background: none; border: none; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 13px;
    flex: 1; cursor: pointer; outline: none; color-scheme: light;
  }

  @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .anim-in { animation: fadeSlide 0.25s ease forwards; }
</style>
</head>
<body>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div class="header-eyebrow">Kettlebell Program</div>
    <div class="header-title">Golf Strength<br><em>& Power</em></div>
  </div>
  <div class="body">
    <div id="streak-card-container"></div>
    <div style="margin-bottom:16px;">
      <div style="font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">This Week</div>
      <div id="week-summary" style="font-size:11px;color:var(--muted);"></div>
    </div>
    <div style="margin-bottom:12px;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;">Select Workout</div>
    <div class="day-grid" id="day-grid"></div>
  </div>
</div>

<!-- WORKOUT -->
<div id="screen-workout" class="screen">
  <div class="workout-header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div id="workout-title" class="workout-title"></div>
    <div class="workout-progress">
      <div class="workout-progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="body" id="workout-body"></div>
  <button class="finish-btn" onclick="openFinishModal()">Finish Workout</button>
</div>

<!-- HISTORY -->
<div id="screen-history" class="screen">
  <div class="header">
    <div class="header-eyebrow">Your Progress</div>
    <div class="header-title">Workout<br><em>History</em></div>
  </div>
  <div class="body" id="history-body"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
    Program
  </button>
  <button class="nav-btn" id="nav-history" onclick="showScreen('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><path d="M9 12h6M9 16h4"/></svg>
    History
  </button>
</div>

<!-- FINISH MODAL -->
<div class="modal-overlay" id="finish-modal">
  <div class="modal">
    <div class="modal-title">Save session</div>
    <div class="modal-sub" id="finish-modal-sub"></div>
    <div class="date-picker-row">
      <span class="date-picker-label">⛳ Date</span>
      <input class="date-picker-input" type="date" id="session-date-input">
    </div>
    <button class="modal-btn primary" onclick="saveSession()">Save</button>
    <button class="modal-btn ghost" onclick="closeFinishModal()">Keep going</button>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-title">Delete session?</div>
    <div class="modal-sub">This can't be undone.</div>
    <button class="modal-btn" style="background:var(--danger);color:#fff;" onclick="confirmDelete()">Delete</button>
    <button class="modal-btn ghost" onclick="document.getElementById('delete-modal').classList.remove('open')">Cancel</button>
  </div>
</div>

<!-- PROGRESSIVE OVERLOAD MODAL -->
<div class="modal-overlay" id="overload-modal">
  <div class="modal">
    <div class="modal-title">Time to progress 🏌️</div>
    <div class="modal-sub" id="overload-modal-sub"></div>
    <button class="modal-btn sage" id="overload-reps-btn" onclick="applyOverload('reps')">+ 2 Reps</button>
    <button class="modal-btn umber" id="overload-weight-btn" onclick="applyOverload('weight')">+ 5 lbs</button>
    <button class="modal-btn ghost" onclick="dismissOverload()">Not yet</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  PROGRAM DATA — all 3 sets, YouTube search links
// ═══════════════════════════════════════════════
const YT = (q) => `https://www.youtube.com/results?search_query=${encodeURIComponent(q + ' tutorial form')}`;

const PROGRAMS = [
  {
    id: 'A', label: 'Power & Pull', focus: 'Posterior chain + rotational power',
    accent: '#6B8F71',
    exercises: [
      { id:'swing', name:'Kettlebell Swing', defaultSets:3, defaultReps:15, icon:'⛳',
        golf:'Hip hinge explosiveness — the engine of your downswing.',
        cue:'Hinge hard, snap hips. Keep your lats packed.',
        youtube: YT('kettlebell swing'), ytLabel:'Watch: KB Swing' },
      { id:'row', name:'Single-Arm Row', defaultSets:3, defaultReps:10, icon:'🏌️',
        golf:'Scapular retraction — stabilises lead shoulder at impact.',
        cue:'Drive elbow to hip. Avoid rotating the torso.',
        youtube: YT('single arm kettlebell row'), ytLabel:'Watch: Single-Arm Row' },
      { id:'goblet', name:'Goblet Squat', defaultSets:3, defaultReps:12, icon:'🌿',
        golf:'Hip mobility + quad strength for a stable base.',
        cue:'Chest tall, elbows inside knees. Sit into it.',
        youtube: YT('goblet squat kettlebell'), ytLabel:'Watch: Goblet Squat' },
    ]
  },
  {
    id: 'B', label: 'Stability & Drive', focus: 'Core anti-rotation + press strength',
    accent: '#8B7355',
    exercises: [
      { id:'tgu', name:'Turkish Get-Up', defaultSets:3, defaultReps:3, icon:'🏔️',
        golf:'Total-body coordination, shoulder stability, hip mobility.',
        cue:'Slow and deliberate. Eye on the bell the whole way.',
        youtube: YT('turkish get up kettlebell'), ytLabel:'Watch: Turkish Get-Up' },
      { id:'press', name:'Single-Arm Press', defaultSets:3, defaultReps:8, icon:'🎯',
        golf:'Shoulder strength + anti-lateral flexion core demand.',
        cue:'Brace hard. Press vertical. Don\'t lean away.',
        youtube: YT('single arm kettlebell press'), ytLabel:'Watch: Single-Arm Press' },
      { id:'carry', name:'Suitcase Carry', defaultSets:3, defaultReps:20, icon:'🚶',
        golf:'Lateral core stability — resists side-bend at top of backswing.',
        cue:'Stand tall. Don\'t hike the loaded hip. Walk smooth.',
        youtube: YT('kettlebell suitcase carry'), ytLabel:'Watch: Suitcase Carry' },
    ]
  },
  {
    id: 'C', label: 'Speed & Finish', focus: 'Rotational power + conditioning',
    accent: '#A67B5B',
    exercises: [
      { id:'clean', name:'KB Clean', defaultSets:3, defaultReps:6, icon:'💥',
        golf:'Triple extension — mirrors the kinetic chain of a drive.',
        cue:'Pull the bell close. Meet it, don\'t catch it.',
        youtube: YT('kettlebell clean'), ytLabel:'Watch: KB Clean' },
      { id:'lunge', name:'Lateral Lunge', defaultSets:3, defaultReps:8, icon:'🌾',
        golf:'Frontal plane hip strength — load and push off trail leg.',
        cue:'Sit into the heel. Keep the other leg straight.',
        youtube: YT('lateral lunge kettlebell'), ytLabel:'Watch: Lateral Lunge' },
      { id:'bup', name:'Bottoms-Up Press', defaultSets:3, defaultReps:6, icon:'🕳️',
        golf:'Wrist stability + rotator cuff — protects at top of backswing.',
        cue:'Grip tighter than normal. Control the wobble.',
        youtube: YT('bottoms up kettlebell press'), ytLabel:'Watch: Bottoms-Up Press' },
    ]
  }
];

let currentProg = null, sessionData = {}, deleteTargetId = null, overloadContext = null;

// ── STORAGE ──
function getHistory() { try { return JSON.parse(localStorage.getItem('kb_history') || '[]'); } catch(e) { return []; } }
function saveHistory(h) { localStorage.setItem('kb_history', JSON.stringify(h)); }
function getLastWeights() { try { return JSON.parse(localStorage.getItem('kb_lastweights') || '{}'); } catch(e) { return {}; } }
function saveLastWeights(w) { localStorage.setItem('kb_lastweights', JSON.stringify(w)); }

// ── NAV ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + name);
  if (nb) nb.classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'history') renderHistory();
}

function goHome() {
  if (confirm('Leave workout? Progress won\'t be saved.')) showScreen('home');
}

// ── STREAK ──
function calcStreak(history) {
  if (!history.length) return { current: 0, best: 0 };
  const MS = 7 * 24 * 60 * 60 * 1000;
  const weekSet = new Set();
  history.forEach(s => {
    const d = new Date(s.date);
    const dow = d.getDay() === 0 ? 6 : d.getDay() - 1;
    const mon = new Date(d); mon.setDate(d.getDate() - dow); mon.setHours(0,0,0,0);
    weekSet.add(mon.getTime());
  });
  const weeks = [...weekSet].sort((a,b) => a-b);

  // Best streak
  let best = 1, cur = 1;
  for (let i = 1; i < weeks.length; i++) {
    if (weeks[i] - weeks[i-1] === MS) { cur++; best = Math.max(best, cur); } else cur = 1;
  }

  // Current streak (allow grace: this week OR last week as anchor)
  const now = new Date();
  const dow = now.getDay() === 0 ? 6 : now.getDay() - 1;
  const thisMon = new Date(now); thisMon.setDate(now.getDate() - dow); thisMon.setHours(0,0,0,0);
  const lastMon = new Date(thisMon); lastMon.setDate(thisMon.getDate() - 7);

  let check = weekSet.has(thisMon.getTime()) ? thisMon.getTime() : lastMon.getTime();
  if (!weekSet.has(check)) return { current: 0, best };
  let current = 0;
  while (weekSet.has(check)) { current++; check -= MS; }
  return { current, best: Math.max(best, current) };
}

// ── HOME ──
function renderHome() {
  const history = getHistory();
  const streak = calcStreak(history);

  // Streak card
  const flame = streak.current >= 4 ? '🏆' : streak.current >= 2 ? '⛳' : '🌱';
  document.getElementById('streak-card-container').innerHTML = `
    <div class="streak-card anim-in">
      <div class="streak-flame">${flame}</div>
      <div class="streak-info">
        <div class="streak-number">${streak.current}<em>week${streak.current !== 1 ? 's' : ''}</em></div>
        <div class="streak-label">Current streak</div>
        ${streak.best > streak.current
          ? `<div class="streak-best">Best: ${streak.best} week${streak.best !== 1 ? 's' : ''}</div>`
          : streak.current > 0
            ? `<div class="streak-best" style="color:var(--safe)">Personal best ✓</div>`
            : `<div class="streak-best">Complete your first session to start</div>`}
      </div>
    </div>`;

  // Week summary
  const now = new Date(), ws = new Date(now);
  ws.setDate(now.getDate() - now.getDay()); ws.setHours(0,0,0,0);
  const thisWeek = history.filter(s => new Date(s.date) >= ws);
  document.getElementById('week-summary').textContent = thisWeek.length === 0
    ? 'No sessions this week yet.'
    : `${thisWeek.length} session${thisWeek.length > 1 ? 's' : ''} · ${thisWeek.map(s => 'Day ' + s.day).join(', ')}`;

  // Day cards
  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';
  PROGRAMS.forEach(prog => {
    const lastSession = [...history].reverse().find(s => s.day === prog.id);
    const card = document.createElement('div');
    card.className = `day-card day-${prog.id.toLowerCase()} anim-in`;
    card.onclick = () => startWorkout(prog.id);
    const lastInfo = lastSession
      ? new Date(lastSession.date).toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short'})
      : '';
    card.innerHTML = `
      <div class="day-card-tag">Day ${prog.id}</div>
      <div class="day-card-title">${prog.label}</div>
      <div class="day-card-sub">${prog.focus}</div>
      <div class="day-card-meta">
        <div class="day-card-meta-item">Exercises<span>${prog.exercises.length}</span></div>
        <div class="day-card-meta-item">Sessions<span>${history.filter(s => s.day === prog.id).length}</span></div>
      </div>
      ${lastSession ? `<div class="completed-badge">✓ ${lastInfo}</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

// ── START WORKOUT ──
function startWorkout(dayId) {
  currentProg = PROGRAMS.find(p => p.id === dayId);
  sessionData = {};
  const lw = getLastWeights();
  currentProg.exercises.forEach(ex => {
    const nextReps = getNextReps(ex.id, ex.defaultReps);
    sessionData[ex.id] = Array.from({length: ex.defaultSets}, () =>
      ({ reps: nextReps, weight: lw[ex.id] || 40, done: false }));
  });
  document.getElementById('workout-title').innerHTML = `Day ${currentProg.id} — <em>${currentProg.label}</em>`;
  document.getElementById('progress-fill').style.background = currentProg.accent;
  renderWorkout();
  showScreen('workout');
}

// ── RENDER WORKOUT ──
function renderWorkout() {
  const body = document.getElementById('workout-body');
  body.innerHTML = '';
  currentProg.exercises.forEach((ex, i) => {
    const sets = sessionData[ex.id];
    const allDone = sets.every(s => s.done);
    const card = document.createElement('div');
    card.className = 'ex-card anim-in';
    card.id = `ex-card-${ex.id}`;
    card.style.animationDelay = `${i * 0.06}s`;
    card.innerHTML = `
      <div class="ex-card-header" onclick="toggleExBody('${ex.id}')">
        <div class="ex-icon" style="background:${currentProg.accent}18">${ex.icon}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${ex.defaultSets} sets · ${ex.defaultReps} reps target</div>
        </div>
        <div class="ex-done-indicator">${allDone ? '✓' : '○'}</div>
      </div>
      <div class="ex-body" id="ex-body-${ex.id}" style="display:${i === 0 ? 'block' : 'none'}">
        <div class="sets-header">
          <span>Set</span><span>Reps</span><span>lbs</span><span></span>
        </div>
        <div id="sets-${ex.id}">${sets.map((s, si) => renderSetRow(ex.id, si, s)).join('')}</div>
        <button class="add-set-btn" onclick="addSet('${ex.id}')">+ Add set</button>
        <div>
          <a class="yt-link" href="${ex.youtube}" target="_blank" rel="noopener">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.19a3.02 3.02 0 00-2.12-2.14C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.38.55A3.02 3.02 0 00.5 6.19C0 8.07 0 12 0 12s0 3.93.5 5.81a3.02 3.02 0 002.12 2.14C4.5 20.5 12 20.5 12 20.5s7.5 0 9.38-.55a3.02 3.02 0 002.12-2.14C24 15.93 24 12 24 12s0-3.93-.5-5.81zM9.75 15.52V8.48L15.86 12l-6.11 3.52z"/></svg>
            ${ex.ytLabel}
          </a>
        </div>
        <button class="golf-tip-btn" onclick="toggleGolfTip('${ex.id}')">⛳ Golf benefit</button>
        <div class="golf-tip-content" id="golf-tip-${ex.id}">
          ${ex.golf}<br><br><em>"${ex.cue}"</em>
        </div>
      </div>
    `;
    body.appendChild(card);
  });
  updateProgress();
}

function renderSetRow(exId, si, s) {
  return `<div class="set-row">
    <div class="set-num">${si + 1}</div>
    <input class="set-input" type="number" inputmode="numeric" value="${s.reps}" placeholder="—"
      onchange="updateSet('${exId}',${si},'reps',this.value)"
      style="border-color:${s.done ? 'var(--safe)' : 'var(--border)'}">
    <input class="set-input" type="number" inputmode="decimal" value="${s.weight}" placeholder="lbs"
      onchange="updateSet('${exId}',${si},'weight',this.value)"
      style="border-color:${s.done ? 'var(--safe)' : 'var(--border)'}">
    <button class="set-check ${s.done ? 'checked' : ''}" onclick="toggleSetDone('${exId}',${si})">✓</button>
  </div>`;
}

function toggleExBody(id) {
  const b = document.getElementById(`ex-body-${id}`);
  b.style.display = b.style.display === 'none' ? 'block' : 'none';
}
function toggleGolfTip(id) { document.getElementById(`golf-tip-${id}`).classList.toggle('open'); }

function updateSet(exId, si, field, value) {
  sessionData[exId][si][field] = value === '' ? '' : parseFloat(value);
  if (field === 'weight') { const lw = getLastWeights(); lw[exId] = parseFloat(value); saveLastWeights(lw); }
}

function toggleSetDone(exId, si) {
  sessionData[exId][si].done = !sessionData[exId][si].done;
  document.getElementById(`sets-${exId}`).innerHTML = sessionData[exId].map((s, i) => renderSetRow(exId, i, s)).join('');
  document.getElementById(`ex-card-${exId}`).querySelector('.ex-done-indicator').textContent =
    sessionData[exId].every(s => s.done) ? '✓' : '○';
  updateProgress();
}

function addSet(exId) {
  const sets = sessionData[exId], last = sets[sets.length - 1];
  sets.push({ reps: last.reps, weight: last.weight, done: false });
  document.getElementById(`sets-${exId}`).innerHTML = sets.map((s, i) => renderSetRow(exId, i, s)).join('');
}

function updateProgress() {
  const total = Object.values(sessionData).reduce((a, s) => a + s.length, 0);
  const done = Object.values(sessionData).reduce((a, s) => a + s.filter(x => x.done).length, 0);
  document.getElementById('progress-fill').style.width = (total ? done / total * 100 : 0) + '%';
}

// ── FINISH / SAVE ──
function openFinishModal() {
  const total = Object.values(sessionData).reduce((a, s) => a + s.length, 0);
  const done = Object.values(sessionData).reduce((a, s) => a + s.filter(x => x.done).length, 0);
  document.getElementById('finish-modal-sub').textContent = `${done} of ${total} sets completed.`;
  const today = new Date();
  document.getElementById('session-date-input').value =
    `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('finish-modal').classList.add('open');
}
function closeFinishModal() { document.getElementById('finish-modal').classList.remove('open'); }

// ── PROGRESSIVE OVERLOAD ──
function checkProgressiveOverload(history, savedSession) {
  const sameDaySessions = history.filter(s => s.day === savedSession.day).slice(-3);
  if (sameDaySessions.length < 3) return null;
  for (const ex of currentProg.exercises) {
    const sessionSets = sameDaySessions.map(s => (s.data[ex.id] || []).filter(x => x.done));
    if (sessionSets.some(sets => sets.length === 0)) continue;
    const avgReps = sessionSets.map(sets => sets.reduce((a, s) => a + (s.reps || 0), 0) / sets.length);
    const avgWeight = sessionSets.map(sets => sets.reduce((a, s) => a + (s.weight || 0), 0) / sets.length);
    if (avgReps.every(r => Math.abs(r - avgReps[0]) < 0.5) && avgWeight.every(w => Math.abs(w - avgWeight[0]) < 1)) {
      return { exId: ex.id, exName: ex.name,
        currentReps: Math.round(avgReps[0]), currentWeight: Math.round(avgWeight[0]),
        suggestedReps: Math.round(avgReps[0]) + 2, suggestedWeight: Math.round(avgWeight[0]) + 5 };
    }
  }
  return null;
}

function getNextReps(exId, defaultReps) {
  const stored = localStorage.getItem(`kb_nextreps_${exId}`);
  if (stored) { localStorage.removeItem(`kb_nextreps_${exId}`); return parseInt(stored); }
  return defaultReps;
}

function applyOverload(type) {
  if (!overloadContext) return;
  if (type === 'reps') {
    localStorage.setItem(`kb_nextreps_${overloadContext.exId}`, overloadContext.suggestedReps);
  } else {
    const lw = getLastWeights(); lw[overloadContext.exId] = overloadContext.suggestedWeight; saveLastWeights(lw);
  }
  overloadContext = null;
  document.getElementById('overload-modal').classList.remove('open');
  showScreen('home');
}
function dismissOverload() {
  overloadContext = null;
  document.getElementById('overload-modal').classList.remove('open');
  showScreen('home');
}

function saveSession() {
  const h = getHistory();
  const dateInput = document.getElementById('session-date-input').value;
  const sessionDate = dateInput ? new Date(dateInput + 'T12:00:00') : new Date();
  const newSession = {
    id: Date.now(), day: currentProg.id, dayLabel: currentProg.label,
    date: sessionDate.toISOString(),
    data: JSON.parse(JSON.stringify(sessionData)),
    totalSets: Object.values(sessionData).reduce((a, s) => a + s.filter(x => x.done).length, 0),
    totalReps: Object.values(sessionData).reduce((a, s) => a + s.filter(x => x.done).reduce((b, x) => b + (x.reps || 0), 0), 0),
  };
  h.push(newSession);
  saveHistory(h);
  closeFinishModal();

  const overload = checkProgressiveOverload(h, newSession);
  if (overload) {
    overloadContext = overload;
    document.getElementById('overload-modal-sub').innerHTML =
      `You've logged the same reps & weight for <strong>${overload.exName}</strong> three sessions in a row — ${overload.currentReps} reps @ ${overload.currentWeight}lbs.<br><br>Your body has adapted. Choose how to progress:`;
    document.getElementById('overload-reps-btn').textContent = `+ 2 Reps  →  ${overload.suggestedReps} reps`;
    document.getElementById('overload-weight-btn').textContent = `+ 5 lbs  →  ${overload.suggestedWeight}lbs`;
    document.getElementById('overload-modal').classList.add('open');
  } else {
    showScreen('home');
  }
}

// ── EXPORT ──
function exportHistory() {
  const history = getHistory();
  if (!history.length) { alert('No sessions to export yet.'); return; }
  const rows = [['Date', 'Day', 'Workout', 'Exercise', 'Set', 'Reps', 'Weight (lbs)', 'Completed']];
  history.forEach(session => {
    const dateStr = new Date(session.date).toLocaleDateString('en-AU');
    const prog = PROGRAMS.find(p => p.id === session.day);
    if (!prog) return;
    prog.exercises.forEach(ex => {
      (session.data[ex.id] || []).forEach((s, si) => {
        rows.push([dateStr, session.day, session.dayLabel, ex.name, si + 1, s.reps, s.weight, s.done ? 'Yes' : 'No']);
      });
    });
  });
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
  a.download = `golf-strength-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
}

// ── HISTORY ──
function renderHistory() {
  const history = getHistory();
  const body = document.getElementById('history-body');
  if (!history.length) {
    body.innerHTML = `<div class="history-empty"><span class="big">No sessions yet</span>Complete your first workout and it'll appear here.</div>`;
    return;
  }
  body.innerHTML = '';

  const exportBtn = document.createElement('button');
  exportBtn.className = 'export-btn';
  exportBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Export data (.csv)`;
  exportBtn.onclick = exportHistory;
  body.appendChild(exportBtn);

  [...history].reverse().forEach(session => {
    const d = new Date(session.date);
    const prog = PROGRAMS.find(p => p.id === session.day);
    const accent = prog ? prog.accent : 'var(--muted)';

    const card = document.createElement('div');
    card.className = 'session-card anim-in';
    card.innerHTML = `
      <div class="session-top">
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:${accent};text-transform:uppercase;margin-bottom:4px">Day ${session.day}</div>
          <div class="session-day">${session.dayLabel}</div>
          <div class="session-date">${d.toLocaleDateString('en-AU', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}</div>
        </div>
        <button class="delete-session-btn" onclick="promptDelete(${session.id})">✕</button>
      </div>
      <div class="session-stats">
        <div class="session-stat">Sets<span>${session.totalSets}</span></div>
        <div class="session-stat">Total reps<span>${session.totalReps}</span></div>
      </div>
    `;

    const detail = document.createElement('div');
    detail.style.cssText = 'margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none;';
    if (prog) {
      prog.exercises.forEach(ex => {
        const sets = (session.data[ex.id] || []).filter(s => s.done);
        if (!sets.length) return;
        const row = document.createElement('div');
        row.style.marginBottom = '10px';
        row.innerHTML = `<div style="font-size:10px;color:var(--muted);margin-bottom:4px">${ex.icon} ${ex.name}</div>
          ${sets.map((s, i) => `<div style="display:flex;gap:10px;font-size:11px;color:var(--muted);margin:3px 0;padding-left:12px">
            <span>Set ${i + 1}</span><span>${s.reps} reps</span><span>@ ${s.weight}lbs</span>
          </div>`).join('')}`;
        detail.appendChild(row);
      });
    }

    const toggleBtn = document.createElement('button');
    toggleBtn.style.cssText = 'background:none;border:none;color:var(--muted);font-family:"DM Mono",monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;padding:12px 0 0;display:block;';
    toggleBtn.textContent = '▸ Show details';
    toggleBtn.onclick = () => {
      const open = detail.style.display !== 'none';
      detail.style.display = open ? 'none' : 'block';
      toggleBtn.textContent = open ? '▸ Show details' : '▾ Hide details';
    };
    card.appendChild(toggleBtn);
    card.appendChild(detail);
    body.appendChild(card);
  });
}

function promptDelete(id) { deleteTargetId = id; document.getElementById('delete-modal').classList.add('open'); }
function confirmDelete() {
  saveHistory(getHistory().filter(s => s.id !== deleteTargetId));
  document.getElementById('delete-modal').classList.remove('open');
  renderHistory();
}

renderHome();
</script>
</body>
