<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KB Edge">
<title>Kettlebell Edge</title>
<link rel="manifest" id="manifest-placeholder">
<script>
  const manifestData = {
    name: "Kettlebell Edge",
    short_name: "KB Edge",
    description: "18-minute kettlebell program for golf performance",
    start_url: ".",
    display: "standalone",
    background_color: "#0A0A0A",
    theme_color: "#0A0A0A",
    orientation: "portrait"
  };
  const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
  document.getElementById('manifest-placeholder').href = URL.createObjectURL(blob);
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0A;
    --surface: #111111;
    --surface2: #181818;
    --border: #222222;
    --text: #F0EDE8;
    --muted: #666666;
    --accent-a: #74C69D;
    --accent-b: #5FA8D3;
    --accent-c: #C77DFF;
    --danger: #FF6B6B;
    --safe: #95E59A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; min-height: 100dvh; }
  .screen.active { display: flex; }

  /* ── HEADER ── */
  .header {
    padding: 52px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .header-eyebrow { font-size: 9px; letter-spacing: 4px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 400; line-height: 1.1; }
  .header-title em { font-style: italic; color: var(--muted); }

  /* ── SCROLL BODY ── */
  .body { flex: 1; overflow-y: auto; padding: 16px 24px 100px; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 6px 0;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--text); }
  .nav-btn svg { width: 20px; height: 20px; }

  /* ── DAY CARDS ── */
  .day-grid { display: flex; flex-direction: column; gap: 12px; }

  .day-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .day-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .day-card.day-a::before { background: var(--accent-a); }
  .day-card.day-b::before { background: var(--accent-b); }
  .day-card.day-c::before { background: var(--accent-c); }
  .day-card:active { background: var(--surface2); }

  .day-card-tag {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px;
  }
  .day-a .day-card-tag { color: var(--accent-a); }
  .day-b .day-card-tag { color: var(--accent-b); }
  .day-c .day-card-tag { color: var(--accent-c); }

  .day-card-title { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 4px; }
  .day-card-sub { font-size: 11px; color: var(--muted); }

  .day-card-meta {
    display: flex; gap: 16px; margin-top: 14px;
    padding-top: 14px; border-top: 1px solid var(--border);
  }
  .day-card-meta-item { font-size: 10px; color: var(--muted); }
  .day-card-meta-item span { display: block; font-size: 13px; color: var(--text); margin-top: 2px; }

  .completed-badge {
    position: absolute; top: 16px; right: 16px;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--safe); border: 1px solid var(--safe);
    padding: 3px 8px; border-radius: 4px;
    opacity: 0.8;
  }

  /* ── WORKOUT SCREEN ── */
  .workout-header {
    padding: 52px 24px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; margin-bottom: 12px; padding: 0;
  }
  .back-btn:active { color: var(--text); }

  .workout-title { font-family: 'Playfair Display', serif; font-size: 22px; }
  .workout-title em { font-style: italic; color: var(--muted); }

  .workout-progress {
    margin-top: 12px;
    height: 2px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .workout-progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  /* ── EXERCISE CARD ── */
  .ex-card {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .ex-card.active-ex { border-color: #333; }

  .ex-card-header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px; cursor: pointer;
  }
  .ex-icon {
    width: 40px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .ex-info { flex: 1; min-width: 0; }
  .ex-name { font-family: 'Playfair Display', serif; font-size: 16px; }
  .ex-meta { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; }
  .ex-done-indicator { font-size: 18px; }

  .ex-body { padding: 0 16px 16px; }

  /* Sets tracker */
  .sets-header {
    display: grid; grid-template-columns: 36px 1fr 1fr 1fr 32px;
    gap: 8px; padding: 8px 0;
    font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
    border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .sets-header span:not(:first-child) { text-align: center; }

  .set-row {
    display: grid; grid-template-columns: 36px 1fr 1fr 1fr 32px;
    gap: 8px; align-items: center; padding: 6px 0;
    border-bottom: 1px solid #161616;
  }
  .set-num {
    font-size: 12px; color: var(--muted); text-align: center;
  }
  .set-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 14px;
    text-align: center; padding: 8px 4px; width: 100%;
    appearance: none; -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .set-input:focus { outline: none; border-color: #444; }
  .set-input::placeholder { color: var(--border); font-size: 12px; }

  .rpe-input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 14px;
    text-align: center; padding: 8px 4px; width: 100%;
    appearance: none; -webkit-appearance: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .rpe-input:focus { outline: none; border-color: #444; }

  .set-check {
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border); background: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.15s; flex-shrink: 0;
  }
  .set-check.checked { background: var(--safe); border-color: var(--safe); }

  .add-set-btn {
    width: 100%; margin-top: 10px;
    background: none; border: 1px dashed var(--border);
    border-radius: 6px; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 10px; cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .add-set-btn:active { border-color: #444; color: var(--text); }

  /* Golf tip toggle */
  .golf-tip-btn {
    display: flex; align-items: center; gap: 6px; margin-top: 12px;
    background: none; border: none; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    padding: 0;
  }
  .golf-tip-content {
    margin-top: 8px; padding: 12px;
    background: var(--bg); border-radius: 6px;
    border-left: 2px solid #2D6A4F;
    font-size: 12px; color: #999; line-height: 1.6;
    display: none;
  }
  .golf-tip-content.open { display: block; }

  /* ── FINISH BTN ── */
  .finish-btn {
    position: fixed; bottom: calc(64px + env(safe-area-inset-bottom));
    left: 24px; right: 24px;
    padding: 16px;
    border: none; border-radius: 10px;
    font-family: 'Playfair Display', serif; font-size: 16px;
    cursor: pointer; transition: opacity 0.2s;
    z-index: 50;
  }
  .finish-btn:active { opacity: 0.8; }

  /* ── HISTORY SCREEN ── */
  .history-empty {
    text-align: center; padding: 60px 24px;
    color: var(--muted); font-size: 13px; line-height: 1.8;
  }
  .history-empty .big { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); display: block; margin-bottom: 8px; }

  .session-card {
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); padding: 16px;
    margin-bottom: 10px;
  }
  .session-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .session-day { font-family: 'Playfair Display', serif; font-size: 16px; }
  .session-date { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .session-stats {
    display: flex; gap: 16px; margin-top: 12px;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  .session-stat { font-size: 10px; color: var(--muted); }
  .session-stat span { display: block; font-size: 14px; color: var(--text); margin-top: 2px; }

  .delete-session-btn {
    background: none; border: none; color: #333; cursor: pointer;
    font-size: 16px; padding: 4px;
  }
  .delete-session-btn:active { color: var(--danger); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: flex; align-items: flex-end; z-index: 200;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border-radius: 20px 20px 0 0;
    width: 100%; padding: 24px 24px max(24px, env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 8px; }
  .modal-sub { font-size: 11px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

  .modal-btn {
    width: 100%; padding: 16px; border-radius: 10px;
    font-family: 'Playfair Display', serif; font-size: 16px;
    border: none; cursor: pointer; margin-bottom: 10px;
    transition: opacity 0.15s;
  }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn.primary { background: var(--text); color: var(--bg); }
  .modal-btn.ghost { background: var(--surface2); color: var(--text); }

  /* ── UTILS ── */
  .tag {
    display: inline-block; font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase; padding: 3px 8px;
    border-radius: 4px; border: 1px solid;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .anim-in { animation: fadeSlide 0.3s ease forwards; }
</style>
</head>
<body>

<!-- ═══════════════════════════ HOME SCREEN ═══════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div class="header-eyebrow">Your Program</div>
    <div class="header-title">The 18-Minute<br><em>Kettlebell Edge</em></div>
  </div>
  <div class="body">
    <div style="margin-bottom:16px;">
      <div style="font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">This Week</div>
      <div id="week-summary" style="font-size:12px;color:var(--muted);">No sessions logged yet</div>
    </div>
    <div style="margin-bottom:12px;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;">Select Workout</div>
    <div class="day-grid" id="day-grid"></div>
  </div>
</div>

<!-- ═══════════════════════════ WORKOUT SCREEN ═══════════════════════════ -->
<div id="screen-workout" class="screen">
  <div class="workout-header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div id="workout-title" class="workout-title"></div>
    <div class="workout-progress">
      <div class="workout-progress-fill" id="progress-fill" style="width:0%;background:var(--accent-a)"></div>
    </div>
  </div>
  <div class="body" id="workout-body"></div>
  <button class="finish-btn" id="finish-btn" onclick="openFinishModal()" style="background:var(--text);color:var(--bg);">
    Finish Workout
  </button>
</div>

<!-- ═══════════════════════════ HISTORY SCREEN ═══════════════════════════ -->
<div id="screen-history" class="screen">
  <div class="header">
    <div class="header-eyebrow">Progress</div>
    <div class="header-title">Workout<br><em>History</em></div>
  </div>
  <div class="body" id="history-body"></div>
</div>

<!-- ═══════════════════════════ BOTTOM NAV ═══════════════════════════ -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
    Program
  </button>
  <button class="nav-btn" id="nav-history" onclick="showScreen('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/><path d="M9 12h6M9 16h4"/></svg>
    History
  </button>
</div>

<!-- ═══════════════════════════ FINISH MODAL ═══════════════════════════ -->
<div class="modal-overlay" id="finish-modal">
  <div class="modal">
    <div class="modal-title">Done? 💪</div>
    <div class="modal-sub" id="finish-modal-sub">Save this session to your history.</div>
    <button class="modal-btn primary" onclick="saveSession()">Save Session</button>
    <button class="modal-btn ghost" onclick="closeFinishModal()">Keep Going</button>
  </div>
</div>

<!-- ═══════════════════════════ DELETE MODAL ═══════════════════════════ -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <div class="modal-title">Delete session?</div>
    <div class="modal-sub">This can't be undone.</div>
    <button class="modal-btn" style="background:var(--danger);color:#fff;" onclick="confirmDelete()">Delete</button>
    <button class="modal-btn ghost" onclick="document.getElementById('delete-modal').classList.remove('open')">Cancel</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════
const PROGRAMS = [
  {
    id: 'A', label: 'Power & Pull', focus: 'Posterior chain + rotational power',
    accent: '#74C69D', accentBg: 'rgba(45,106,79,0.15)',
    exercises: [
      { id:'swing', name:'Kettlebell Swing', defaultSets:4, defaultReps:15, icon:'🔄',
        golf:'Hip hinge explosiveness — the engine of your downswing', cue:'Hinge hard, snap hips. Keep your lats packed.' },
      { id:'row', name:'Single-Arm Row', defaultSets:3, defaultReps:10, icon:'💪',
        golf:'Scapular retraction — stabilises lead shoulder at impact', cue:'Drive elbow to hip. Avoid rotating the torso.' },
      { id:'goblet', name:'Goblet Squat', defaultSets:3, defaultReps:12, icon:'🏋️',
        golf:'Hip mobility + quad strength for stable base', cue:'Chest tall, elbows inside knees. Sit into it.' },
      { id:'halo', name:'Half-Kneeling Halo', defaultSets:2, defaultReps:8, icon:'🌀',
        golf:'Thoracic rotation + shoulder mobility', cue:'Keep pelvis locked. Only the upper body moves.' },
    ]
  },
  {
    id: 'B', label: 'Stability & Drive', focus: 'Core anti-rotation + press strength',
    accent: '#5FA8D3', accentBg: 'rgba(27,73,101,0.15)',
    exercises: [
      { id:'tgu', name:'Turkish Get-Up', defaultSets:3, defaultReps:3, icon:'⬆️',
        golf:'Total-body coordination, shoulder stability, hip mobility', cue:'Slow and deliberate. Eye on the bell the whole way.' },
      { id:'press', name:'Single-Arm Press', defaultSets:3, defaultReps:8, icon:'🫸',
        golf:'Shoulder strength + anti-lateral flexion core demand', cue:'Brace like you\'re about to take a punch. Press vertical.' },
      { id:'carry', name:'Suitcase Carry', defaultSets:3, defaultReps:20, icon:'🧳',
        golf:'Lateral core stability — resists side-bend at top of backswing', cue:'Stand tall. Don\'t hike the loaded hip. Walk smooth.' },
      { id:'deadbug', name:'Dead Bug (KB hold)', defaultSets:3, defaultReps:8, icon:'🪲',
        golf:'Deep core + hip flexor dissociation — essential for X-factor', cue:'Lower back flat to floor. Slow leg.' },
    ]
  },
  {
    id: 'C', label: 'Speed & Finish', focus: 'Rotational power + conditioning',
    accent: '#C77DFF', accentBg: 'rgba(123,45,139,0.15)',
    exercises: [
      { id:'clean', name:'KB Clean', defaultSets:4, defaultReps:6, icon:'⚡',
        golf:'Triple extension — mirrors the kinetic chain of a drive', cue:'Pull the bell close. Meet it, don\'t catch it.' },
      { id:'lunge', name:'Lateral Lunge', defaultSets:3, defaultReps:8, icon:'↔️',
        golf:'Frontal plane hip strength — load and push off trail leg', cue:'Sit into the heel. Keep the other leg straight.' },
      { id:'bup', name:'Bottoms-Up Press', defaultSets:3, defaultReps:6, icon:'🫳',
        golf:'Wrist stability + rotator cuff — protects at top of backswing', cue:'Grip tighter than normal. Control the wobble.' },
      { id:'swingsquat', name:'Swing to Squat', defaultSets:3, defaultReps:10, icon:'🔁',
        golf:'Full-body conditioning + deceleration control', cue:'Catch the bell at top, squat deep, stand and swing again.' },
    ]
  }
];

// State
let currentProg = null;
let sessionData = {}; // { exId: [ {reps, weight, rpe, done}, ... ] }
let deleteTargetId = null;

// ═══════════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════════
function getHistory() {
  try { return JSON.parse(localStorage.getItem('kb_history') || '[]'); }
  catch(e) { return []; }
}
function saveHistory(h) { localStorage.setItem('kb_history', JSON.stringify(h)); }

function getLastWeights() {
  try { return JSON.parse(localStorage.getItem('kb_lastweights') || '{}'); }
  catch(e) { return {}; }
}
function saveLastWeights(w) { localStorage.setItem('kb_lastweights', JSON.stringify(w)); }

// ═══════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById('nav-' + name);
  if (navBtn) navBtn.classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'history') renderHistory();
}

function goHome() {
  if (confirm('Leave workout? Progress won\'t be saved.')) showScreen('home');
}

// ═══════════════════════════════════════════════════════════
//  HOME RENDER
// ═══════════════════════════════════════════════════════════
function renderHome() {
  const history = getHistory();
  const grid = document.getElementById('day-grid');
  const weekSummary = document.getElementById('week-summary');

  // Week summary
  const now = new Date();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay());
  weekStart.setHours(0,0,0,0);
  const thisWeek = history.filter(s => new Date(s.date) >= weekStart);
  if (thisWeek.length === 0) {
    weekSummary.textContent = 'No sessions logged yet — let\'s go.';
  } else {
    weekSummary.textContent = `${thisWeek.length} session${thisWeek.length>1?'s':''} this week · ${thisWeek.map(s=>'Day '+s.day).join(', ')}`;
  }

  // Day cards
  grid.innerHTML = '';
  PROGRAMS.forEach(prog => {
    const lastSession = [...history].reverse().find(s => s.day === prog.id);
    const card = document.createElement('div');
    card.className = `day-card day-${prog.id.toLowerCase()} anim-in`;
    card.onclick = () => startWorkout(prog.id);

    let lastInfo = '';
    if (lastSession) {
      const d = new Date(lastSession.date);
      lastInfo = `Last: ${d.toLocaleDateString('en-AU', {weekday:'short', day:'numeric', month:'short'})}`;
    }

    card.innerHTML = `
      <div class="day-card-tag">Day ${prog.id}</div>
      <div class="day-card-title">${prog.label}</div>
      <div class="day-card-sub">${prog.focus}</div>
      <div class="day-card-meta">
        <div class="day-card-meta-item">Exercises<span>${prog.exercises.length}</span></div>
        <div class="day-card-meta-item">Target time<span>~18 min</span></div>
        <div class="day-card-meta-item">Sessions<span>${history.filter(s=>s.day===prog.id).length}</span></div>
      </div>
      ${lastSession ? `<div class="completed-badge">✓ ${lastInfo}</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════════════════
//  START WORKOUT
// ═══════════════════════════════════════════════════════════
function startWorkout(dayId) {
  currentProg = PROGRAMS.find(p => p.id === dayId);
  sessionData = {};
  const lastWeights = getLastWeights();

  // Init session data from defaults
  currentProg.exercises.forEach(ex => {
    const sets = [];
    for (let i = 0; i < ex.defaultSets; i++) {
      sets.push({
        reps: ex.defaultReps,
        weight: lastWeights[ex.id] || 18, // default 18kg
        rpe: '',
        done: false
      });
    }
    sessionData[ex.id] = sets;
  });

  document.getElementById('workout-title').innerHTML =
    `Day ${currentProg.id}: <em>${currentProg.label}</em>`;
  document.getElementById('progress-fill').style.background = currentProg.accent;

  renderWorkout();
  showScreen('workout');
}

// ═══════════════════════════════════════════════════════════
//  RENDER WORKOUT
// ═══════════════════════════════════════════════════════════
function renderWorkout() {
  const body = document.getElementById('workout-body');
  body.innerHTML = '';

  currentProg.exercises.forEach((ex, exIdx) => {
    const sets = sessionData[ex.id];
    const allDone = sets.every(s => s.done);

    const card = document.createElement('div');
    card.className = 'ex-card anim-in';
    card.id = `ex-card-${ex.id}`;
    card.style.animationDelay = `${exIdx * 0.06}s`;

    card.innerHTML = `
      <div class="ex-card-header" onclick="toggleExBody('${ex.id}')">
        <div class="ex-icon" style="background:${currentProg.accent}22">${ex.icon}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-meta">${ex.defaultSets} sets · ${ex.defaultReps} reps target</div>
        </div>
        <div class="ex-done-indicator">${allDone ? '✅' : '○'}</div>
      </div>
      <div class="ex-body" id="ex-body-${ex.id}" style="display:${exIdx===0?'block':'none'}">
        <div class="sets-header">
          <span>Set</span>
          <span>Reps</span>
          <span>kg</span>
          <span>RPE</span>
          <span></span>
        </div>
        <div id="sets-${ex.id}">
          ${sets.map((s, si) => renderSetRow(ex.id, si, s)).join('')}
        </div>
        <button class="add-set-btn" onclick="addSet('${ex.id}')">+ Add Set</button>
        <button class="golf-tip-btn" onclick="toggleGolfTip('${ex.id}')">
          ⛳ Golf benefit
        </button>
        <div class="golf-tip-content" id="golf-tip-${ex.id}">
          <strong style="font-size:11px;color:${currentProg.accent}">${ex.name}</strong><br>
          ${ex.golf}<br><br>
          <em style="font-size:11px">"${ex.cue}"</em>
        </div>
      </div>
    `;
    body.appendChild(card);
  });

  updateProgress();
}

function renderSetRow(exId, si, s) {
  const rpeColor = s.rpe ? rpeToColor(s.rpe) : 'var(--border)';
  return `
    <div class="set-row" id="set-row-${exId}-${si}">
      <div class="set-num">${si + 1}</div>
      <input class="set-input" type="number" inputmode="numeric" pattern="[0-9]*"
        value="${s.reps}" placeholder="—"
        onchange="updateSet('${exId}',${si},'reps',this.value)"
        style="border-color:${s.done?'var(--safe)':'var(--border)'}">
      <input class="set-input" type="number" inputmode="decimal" pattern="[0-9]*"
        value="${s.weight}" placeholder="kg"
        onchange="updateSet('${exId}',${si},'weight',this.value)"
        style="border-color:${s.done?'var(--safe)':'var(--border)'}">
      <input class="rpe-input" type="number" inputmode="numeric" pattern="[0-9]*"
        min="1" max="10" value="${s.rpe}" placeholder="—"
        onchange="updateSet('${exId}',${si},'rpe',this.value)"
        style="border-color:${rpeColor};color:${s.rpe?rpeColor:'var(--text)'}">
      <button class="set-check ${s.done?'checked':''}" onclick="toggleSetDone('${exId}',${si})">
        ${s.done ? '✓' : ''}
      </button>
    </div>
  `;
}

function rpeToColor(rpe) {
  const n = parseInt(rpe);
  if (n <= 6) return '#95E59A';
  if (n <= 8) return '#F4A261';
  return '#FF6B6B';
}

function toggleExBody(exId) {
  const body = document.getElementById(`ex-body-${exId}`);
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

function toggleGolfTip(exId) {
  const tip = document.getElementById(`golf-tip-${exId}`);
  tip.classList.toggle('open');
}

function updateSet(exId, si, field, value) {
  sessionData[exId][si][field] = field === 'reps' || field === 'weight' || field === 'rpe'
    ? (value === '' ? '' : parseFloat(value))
    : value;
  // Update weight memory
  if (field === 'weight') {
    const lw = getLastWeights();
    lw[exId] = parseFloat(value);
    saveLastWeights(lw);
  }
}

function toggleSetDone(exId, si) {
  sessionData[exId][si].done = !sessionData[exId][si].done;

  // Re-render just the sets list and header indicator
  const setsEl = document.getElementById(`sets-${exId}`);
  setsEl.innerHTML = sessionData[exId].map((s, i) => renderSetRow(exId, i, s)).join('');

  // Update done indicator
  const card = document.getElementById(`ex-card-${exId}`);
  const allDone = sessionData[exId].every(s => s.done);
  card.querySelector('.ex-done-indicator').textContent = allDone ? '✅' : '○';

  updateProgress();
}

function addSet(exId) {
  const sets = sessionData[exId];
  const last = sets[sets.length - 1];
  sets.push({ reps: last.reps, weight: last.weight, rpe: '', done: false });
  const setsEl = document.getElementById(`sets-${exId}`);
  setsEl.innerHTML = sets.map((s, i) => renderSetRow(exId, i, s)).join('');
}

function updateProgress() {
  const total = Object.values(sessionData).reduce((a, sets) => a + sets.length, 0);
  const done = Object.values(sessionData).reduce((a, sets) => a + sets.filter(s => s.done).length, 0);
  const pct = total === 0 ? 0 : (done / total) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ═══════════════════════════════════════════════════════════
//  FINISH / SAVE
// ═══════════════════════════════════════════════════════════
function openFinishModal() {
  const total = Object.values(sessionData).reduce((a, s) => a + s.length, 0);
  const done = Object.values(sessionData).reduce((a, s) => a + s.filter(x=>x.done).length, 0);
  document.getElementById('finish-modal-sub').textContent =
    `${done} of ${total} sets completed. Ready to log it?`;
  document.getElementById('finish-modal').classList.add('open');
}

function closeFinishModal() {
  document.getElementById('finish-modal').classList.remove('open');
}

function saveSession() {
  const history = getHistory();
  const session = {
    id: Date.now(),
    day: currentProg.id,
    dayLabel: currentProg.label,
    date: new Date().toISOString(),
    data: JSON.parse(JSON.stringify(sessionData)),
    totalSets: Object.values(sessionData).reduce((a,s)=>a+s.filter(x=>x.done).length,0),
    totalReps: Object.values(sessionData).reduce((a,s)=>a+s.filter(x=>x.done).reduce((b,x)=>b+(x.reps||0),0),0),
  };
  history.push(session);
  saveHistory(history);
  closeFinishModal();
  showScreen('home');
}

// ═══════════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════════
function renderHistory() {
  const history = getHistory();
  const body = document.getElementById('history-body');

  if (history.length === 0) {
    body.innerHTML = `<div class="history-empty">
      <span class="big">No sessions yet</span>
      Complete your first workout and it'll appear here.
    </div>`;
    return;
  }

  body.innerHTML = '';
  [...history].reverse().forEach(session => {
    const d = new Date(session.date);
    const dateStr = d.toLocaleDateString('en-AU', {weekday:'long', day:'numeric', month:'long'});
    const timeStr = d.toLocaleTimeString('en-AU', {hour:'2-digit', minute:'2-digit'});
    const prog = PROGRAMS.find(p => p.id === session.day);
    const accent = prog ? prog.accent : 'var(--muted)';

    const avgRpe = (() => {
      const rpes = Object.values(session.data).flat().map(s=>s.rpe).filter(r=>r!=='');
      if (!rpes.length) return '—';
      return (rpes.reduce((a,b)=>a+(+b),0)/rpes.length).toFixed(1);
    })();

    const card = document.createElement('div');
    card.className = 'session-card anim-in';
    card.innerHTML = `
      <div class="session-top">
        <div>
          <div style="font-size:9px;letter-spacing:2px;color:${accent};text-transform:uppercase;margin-bottom:4px">Day ${session.day}</div>
          <div class="session-day">${session.dayLabel}</div>
          <div class="session-date">${dateStr} · ${timeStr}</div>
        </div>
        <button class="delete-session-btn" onclick="promptDelete(${session.id})">🗑</button>
      </div>
      <div class="session-stats">
        <div class="session-stat">Sets done<span>${session.totalSets}</span></div>
        <div class="session-stat">Total reps<span>${session.totalReps}</span></div>
        <div class="session-stat">Avg RPE<span>${avgRpe}</span></div>
      </div>
    `;

    // Exercise breakdown toggle
    const detail = document.createElement('div');
    detail.style.cssText = 'margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none;';
    detail.id = `detail-${session.id}`;

    const prog2 = PROGRAMS.find(p => p.id === session.day);
    if (prog2) {
      prog2.exercises.forEach(ex => {
        const sets = session.data[ex.id] || [];
        const doneSets = sets.filter(s => s.done);
        if (!doneSets.length) return;
        const row = document.createElement('div');
        row.style.cssText = 'margin-bottom:10px;';
        row.innerHTML = `
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${ex.icon} ${ex.name}</div>
          ${doneSets.map((s,i) => `
            <div style="display:flex;gap:8px;font-size:11px;color:#888;margin:3px 0;padding-left:12px">
              <span>Set ${i+1}</span>
              <span>${s.reps} reps</span>
              <span>@ ${s.weight}kg</span>
              ${s.rpe ? `<span style="color:${rpeToColor(s.rpe)}">RPE ${s.rpe}</span>` : ''}
            </div>
          `).join('')}
        `;
        detail.appendChild(row);
      });
    }

    const toggleBtn = document.createElement('button');
    toggleBtn.style.cssText = 'background:none;border:none;color:var(--muted);font-family:"DM Mono",monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;padding:12px 0 0;display:block;';
    toggleBtn.textContent = '▸ Show details';
    toggleBtn.onclick = () => {
      const isOpen = detail.style.display !== 'none';
      detail.style.display = isOpen ? 'none' : 'block';
      toggleBtn.textContent = isOpen ? '▸ Show details' : '▾ Hide details';
    };

    card.appendChild(toggleBtn);
    card.appendChild(detail);
    body.appendChild(card);
  });
}

function promptDelete(id) {
  deleteTargetId = id;
  document.getElementById('delete-modal').classList.add('open');
}

function confirmDelete() {
  const history = getHistory().filter(s => s.id !== deleteTargetId);
  saveHistory(history);
  document.getElementById('delete-modal').classList.remove('open');
  renderHistory();
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
renderHome();
</script>
</body>
</html>
